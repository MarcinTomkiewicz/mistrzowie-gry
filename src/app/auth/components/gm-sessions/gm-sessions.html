<header class="mg-section__header w-100 m-sm">
  <h2 class="mg-section__title mg-section__title--md">
    <span>{{ i18n.gmSessions().title }}</span>
  </h2>

  <p class="mg-section__subtitle mg-section__subtitle--full">
    {{ i18n.gmSessions().subtitle }}
  </p>
</header>

<app-loading-overlay
  [visible]="isLoading()"
  [label]="i18n.commonStatus().loading"
/>

<div class="flex-col-start-center w-100 gap-md">
  @if (isFormVisible()) {
    <app-session-form
      [initial]="initialFormData()"
      [systems]="systems()"
      [styles]="styles()"
      [triggers]="triggers()"
      [busy]="isSubmitting()"
      [submitLabel]="
        isEditing() ? i18n.actions().updateLabel : i18n.actions().createLabel
      "
      [cancelLabel]="i18n.commonActions().cancel"
      (save)="saveSession($event)"
      (cancel)="cancelEdition()"
    />
  } @else {
    <div class="w-100 flex-row-center-center">
      <p-button
        severity="success"
        [label]="i18n.actions().addLabel"
        [icon]="'pi pi-creation'"
        (onClick)="startCreate()"
      />
    </div>
  }

  @if (mySessionSystems().length > 0) {
    <div class="w-100 flex-row-end-center">
      <div class="w-40 w-60-md w-100-sm">
        <p-select
          [formControl]="systemFilterControl"
          [options]="systemFilterOptions()"
          optionLabel="name"
          optionValue="id"
          appendTo="body"
          class="w-100"
        />
      </div>
    </div>
  }

  <app-session-list
    class="w-100"
    [sessions]="filteredSessions()"
    [gmDisplayName]="gmDisplayName()"
    [labels]="sessionListLabels()"
    [emptyTitle]="i18n.empty().title"
    [emptyDescription]="i18n.empty().description"
    [rows]="10"
    [rowsPerPageOptions]="rowsPerPageOptions"
    [showActions]="true"
    [busy]="isSubmitting()"
    [resolveDifficultyLabel]="resolveDifficultyLabel.bind(this)"
    [playersLabel]="i18n.playersLabel"
    [minAgeLabel]="i18n.minAgeLabel"
    (edit)="startEdit($event)"
    (delete)="deleteSession($event)"
  />
</div>
