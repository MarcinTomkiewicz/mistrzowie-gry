@if (visible()) {
  <div
    class="p-dialog-mask mg-legal-dialog__backdrop"
    aria-hidden="true"
    (click)="close()"
  ></div>

  <section
    class="p-dialog mg-dialog mg-dialog--lg mg-legal-dialog"
    role="dialog"
    aria-modal="true"
    aria-labelledby="legal-dialog-title"
    (click)="$event.stopPropagation()"
  >
    <div class="p-dialog-header flex-row-between-center gap-sm">
      <div class="flex-1 min-w-0 flex-col-start-stretch gap-xs">
        @if (dialogTitle()) {
          <h2
            id="legal-dialog-title"
            class="mg-section__title mg-section__title--sm m-0"
          >
            {{ dialogTitle() }}
          </h2>
        }

        @if (dialogSubtitle()) {
          <p class="m-0 mt-sm">
            {{ dialogSubtitle() }}
          </p>
        }
      </div>

      <p-button
        icon="pi pi-times"
        [rounded]="true"
        [text]="true"
        styleClass="p-dialog-close-button align-self-start"
        size="small"
        ariaLabel="Zamknij"
        (onClick)="close()"
      />
    </div>

    <div class="p-dialog-content mg-legal-dialog__body px-md">
      <app-rich-content [content]="dialogContent()" />
    </div>

    <div class="p-dialog-footer flex-row-end-center">
      <p-button
        [label]="closeLabel()"
        severity="secondary"
        (onClick)="close()"
        class="mt-md"
      />
    </div>
  </section>
}
