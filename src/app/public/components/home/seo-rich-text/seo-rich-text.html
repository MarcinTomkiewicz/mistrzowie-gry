<section class="mg-section" [attr.aria-label]="header().title">
  <div class="mg-container">
    <header class="mg-section__header">
      <h2 class="mg-section__title">{{ header().title }}</h2>
      <p class="mg-section__subtitle">
        {{ header().subtitle }}
      </p>
    </header>

    <div class="mg-card mg-seo-text">
      <div class="flex-row-start-start flex-col-sm gap-xl">
        @for (col of columns(); track trackByColId($index, col)) {
          <div
            class="mg-seo-text__col"
            pAnimateOnScroll
            enterClass="animate-enter-fade-up animate-duration-800 animate-ease-out animate-fill-both"
          >
            @for (
              section of col.sections;
              track trackBySectionId($index, section)
            ) {
              <h3 class="mg-section__title mg-section__title--sm">
                {{ section.title }}
              </h3>

              @for (p of section.paragraphs; track trackByIndex($index)) {
                <p>{{ p }}</p>
              }
            }
          </div>
        }
      </div>
    </div>
  </div>
</section>
