<section class="mg-section" [attr.aria-label]="i18n.aria().sectionLabel">
  <div class="mg-container">
    <div
      class="mg-hero__wrap"
      (mouseenter)="userPaused.set(true)"
      (mouseleave)="userPaused.set(false)"
      (focusin)="userPaused.set(true)"
      (focusout)="userPaused.set(false)"
    >
      @if (activeSlide(); as active) {
        <div class="mg-hero__media mg-card">
          <div class="mg-hero__stage">
            <img
              class="mg-hero__img"
              [ngSrc]="active.imageSrc"
              ngSrcset="320w, 480w, 680w, 960w"
              [alt]="active.imageAlt"
              width="597"
              height="373"
              decoding="async"
              sizes="(max-width: 1023px) calc(100vw - 3rem), 600px"
              [loaderParams]="heroImageLoaderParams"
              [priority]="activeIndex() === 0"
            />

            <a
              class="mg-hero__stretched-link"
              [routerLink]="active.ctaPath"
              [attr.aria-label]="active.heading || null"
            ></a>

            <div class="mg-hero__overlay" aria-hidden="true"></div>

            <div class="mg-hero__caption">
              <div class="flex-row-between-center flex-col-sm">
                <div
                  class="mg-section__title mg-section__title--sm mg-section__title--no-margin truncate-2"
                >
                  {{ active.heading }}
                </div>

                <p-button
                  class="mg-hero__caption-btn"
                  [label]="active.ctaLabel || ''"
                  icon="pi pi-trail"
                  iconPos="right"
                  severity="primary"
                  size="small"
                  [routerLink]="active.ctaPath"
                />
              </div>

              <p class="mg-hero__caption-text truncate-2">
                {{ active.text }}
              </p>
            </div>

            <div class="mg-hero__controls flex-row-between-center">
              <p-button
                type="button"
                icon="pi pi-chevron-left"
                severity="secondary"
                size="small"
                [text]="true"
                (onClick)="prev()"
                [ariaLabel]="i18n.aria().prev"
              />

              <div
                class="flex-row-center-center gap-sm"
                role="tablist"
                [attr.aria-label]="i18n.aria().dots"
              >
                @for (slide of slides(); track trackById($index, slide)) {
                  <button
                    type="button"
                    class="mg-hero__dot"
                    [class.is-active]="$index === activeIndex()"
                    (click)="goTo($index)"
                    [attr.aria-label]="dotAriaLabel(i18n.aria().goToSlidePrefix, $index)"
                    [attr.aria-current]="$index === activeIndex() ? 'true' : null"
                  ></button>
                }
              </div>

              <p-button
                type="button"
                icon="pi pi-chevron-right"
                severity="secondary"
                size="small"
                [text]="true"
                (onClick)="next()"
                [ariaLabel]="i18n.aria().next"
              />
            </div>
          </div>
        </div>

        <div class="flex-col-between-start h-100 hide-down-md">
          <header class="mg-section__header w-100 m-0">
            <h1 class="mg-section__title">{{ active.heading }}</h1>

            <p class="mg-section__subtitle mg-hero__subtitle truncate-3">
              {{ active.text }}
            </p>
          </header>

          <div class="mg-hero__cta-grid">
            @for (slide of slides(); track trackByCtaPath($index, slide)) {
              <div
                class="mg-card mg-hero__cta"
                role="link"
                tabindex="0"
                (click)="onCtaNavigate(slide.ctaPath)"
                (keydown)="onCtaKeydown($event, slide.ctaPath)"
                [attr.aria-label]="slide.heading || null"
              >
                <div
                  class="mg-section__title mg-section__title--xs mg-section__title--no-margin"
                >
                  {{ slide.heading }}
                </div>

                <p
                  class="mg-section__subtitle mg-section__subtitle--no-margin truncate-3"
                >
                  {{ slide.text }}
                </p>
              </div>
            }
          </div>
        </div>
      }
    </div>
  </div>
</section>
