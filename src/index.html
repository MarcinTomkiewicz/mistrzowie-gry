<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />

    <title>Gry fabularne na wyciągnięcie ręki - Mistrzowie Gry</title>

    <base href="/" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta
      name="description"
      content="Nie przejmuj się brakiem Mistrza Gry ani czytaniem podręczników. Organizujemy sesje RPG dla początkujących, prowadzimy gry fabularne, pomagamy zacząć grać i znaleźć drużynę."
    />

    <meta name="color-scheme" content="dark light" />

    <meta name="theme-color" content="#0b0b0b" />

    <script>
      (() => {
        try {
          const key = 'mg-theme';
          const root = document.documentElement;
          const stored = localStorage.getItem(key);
          const systemLight =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: light)').matches;
          const next =
            stored === 'light' || stored === 'dark'
              ? stored
              : systemLight
                ? 'light'
                : 'dark';

          if (next === 'light') root.setAttribute('data-theme', 'light');
          else root.removeAttribute('data-theme');
        } catch {}
      })();
    </script>

    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <link
      rel="preload"
      href="/assets/fonts/BebasNeue-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

  </head>

  <body>
    <app-root></app-root>
  </body>
</html>
