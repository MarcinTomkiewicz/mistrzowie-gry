<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />

    <title>Gry fabularne na wyciągnięcie ręki - Mistrzowie Gry</title>

    <base href="/" />

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <meta
      name="description"
      content="Nie przejmuj się brakiem Mistrza Gry ani czytaniem podręczników. Organizujemy sesje RPG dla początkujących, prowadzimy gry fabularne, pomagamy zacząć grać i znaleźć drużynę."
    />

    <meta name="color-scheme" content="dark light" />

    <meta name="theme-color" content="#0b0b0b" />

    <script>
      (() => {
        try {
          const key = 'mg-theme';
          const root = document.documentElement;
          const stored = localStorage.getItem(key);
          const systemLight =
            window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: light)').matches;
          const next =
            stored === 'light' || stored === 'dark'
              ? stored
              : systemLight
                ? 'light'
                : 'dark';

          if (next === 'light') root.setAttribute('data-theme', 'light');
          else root.removeAttribute('data-theme');
        } catch {}
      })();
    </script>

    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      onload="
        this.onload = null;
        this.rel = 'stylesheet';
      "
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap"
      />
    </noscript>

    <link
      rel="preload"
      as="image"
      href="/hero/hero-1.avif"
      fetchpriority="high"
    />
  </head>

  <body>
    <app-root></app-root>
  </body>
</html>
